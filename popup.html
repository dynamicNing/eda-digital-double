<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 340px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; }
    .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 16px; text-align: center; }
    .header h1 { font-size: 16px; font-weight: 600; }
    .header p { font-size: 11px; opacity: 0.8; margin-top: 4px; }
    .content { padding: 16px; }
    .status { display: flex; align-items: center; gap: 8px; padding: 12px; background: #16213e; border-radius: 8px; margin-bottom: 12px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .status-dot.logged-in { background: #00d26a; box-shadow: 0 0 6px #00d26a; }
    .status-dot.logged-out { background: #ff4757; }
    .status-dot.idle { background: #f59e0b; }
    .status-text { font-size: 13px; }
    .btn { width: 100%; padding: 10px; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; transition: opacity 0.2s; margin-bottom: 8px; }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
    .btn-secondary { background: #2d3748; color: #ccc; }
    .btn-danger { background: #c53030; color: white; }
    .btn-success { background: #276749; color: white; }
    .stat-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .stat { flex: 1; background: #16213e; border-radius: 8px; padding: 12px; text-align: center; }
    .stat-num { font-size: 22px; font-weight: 700; color: #667eea; }
    .stat-label { font-size: 11px; color: #888; margin-top: 4px; }
    .toast { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%) translateY(20px); background: #00d26a; color: white; padding: 8px 16px; border-radius: 20px; font-size: 12px; opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.error { background: #ff4757; }
    .footer { text-align: center; font-size: 10px; color: #555; padding: 8px; }
    .divider { border-top: 1px solid #333; margin: 12px 0; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🎭 E大数字分身</h1>
    <p>长赢同路人数据采集 · v1.1.0</p>
  </div>

  <div class="content">
    <div class="status">
      <div class="status-dot idle" id="statusDot"></div>
      <span class="status-text" id="statusText">请在长赢同路人页面使用</span>
    </div>

    <div class="stat-row">
      <div class="stat">
        <div class="stat-num" id="countNum">0</div>
        <div class="stat-label">已采集帖子</div>
      </div>
    </div>

    <button class="btn btn-primary" id="collectBtn">📥 采集本页E大帖子</button>
    <button class="btn btn-success" id="exportBtn">💾 导出JSON</button>
    <button class="btn btn-secondary" id="refreshBtn">🔄 刷新计数</button>
    <button class="btn btn-danger" id="clearBtn">🗑 清空数据</button>
  </div>

  <div class="toast" id="toast"></div>
  <div class="footer">仅供个人学习研究使用</div>

  <script src="popup.js"></script>
</body>
</html>

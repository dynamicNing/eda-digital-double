<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 320px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; }
    .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 16px; text-align: center; }
    .header h1 { font-size: 16px; font-weight: 600; }
    .header p { font-size: 11px; opacity: 0.8; margin-top: 4px; }
    .content { padding: 16px; }
    .status { display: flex; align-items: center; gap: 8px; padding: 12px; background: #16213e; border-radius: 8px; margin-bottom: 12px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; }
    .status-dot.logged-in { background: #00d26a; box-shadow: 0 0 6px #00d26a; }
    .status-dot.logged-out { background: #ff4757; }
    .status-text { font-size: 13px; }
    .token-box { background: #16213e; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
    .token-label { font-size: 11px; color: #888; margin-bottom: 6px; }
    .token-value { font-size: 12px; font-family: 'Courier New', monospace; word-break: break-all; color: #00d26a; }
    .btn { width: 100%; padding: 10px; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; margin-bottom: 8px; }
    .btn-secondary { background: #2d3748; color: #ccc; }
    .toast { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%) translateY(20px); background: #00d26a; color: white; padding: 8px 16px; border-radius: 20px; font-size: 12px; opacity: 0; transition: all 0.3s; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .footer { text-align: center; font-size: 10px; color: #555; padding: 8px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🎭 E大数字分身</h1>
    <p>且慢数据提取工具 v1.0.0</p>
  </div>

  <div class="content">
    <div class="status">
      <div class="status-dot logged-out" id="statusDot"></div>
      <span class="status-text" id="statusText">检测登录状态...</span>
    </div>

    <div class="token-box">
      <div class="token-label">Access Token</div>
      <div class="token-value" id="tokenValue">-</div>
    </div>

    <button class="btn btn-primary" id="copyBtn">📋 复制Token</button>
    <button class="btn btn-secondary" id="refreshBtn">🔄 刷新状态</button>
  </div>

  <div class="toast" id="toast">已复制到剪贴板</div>
  <div class="footer">仅供个人学习研究使用</div>

  <script src="popup.js"></script>
</body>
</html>
